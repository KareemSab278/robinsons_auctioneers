<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Product Manager</h1>
  <div id="msg"></div>

  <div class="card">
    <h2>Add Product</h2>
    <form id="add-form">
      <label>Name<input type="text" id="new-name" required placeholder="Widget A" /></label>
      <label>Category<input type="text" id="new-cat" required placeholder="Electronics" /></label>
      <label>Price<input type="number" id="new-price" required min="0" step="0.01" placeholder="9.99" style="width:110px" /></label>
      <label class="checkbox-label">
        <input type="checkbox" id="new-avail" checked />
        Available
      </label>
      <button type="submit" class="btn-add">Add</button>
    </form>
  </div>

  <div class="card">
    <h2>Products</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Available</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="product-list"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
